# ══════════════════════════════════════════════════════════════════════════════
#                   Intent™ BOT v3.0 — docker-compose.yml
#
# Usage:
#   1. cp .env.example .env  &&  nano .env       (fill in your token)
#   2. docker compose up -d
#   3. docker compose logs -f                    (view live logs)
# ══════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:
  intentbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intentbot
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist database and logs outside the container
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    # Resource limits — adjust for your VPS tier
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,sys; sys.exit(0 if os.path.exists('data') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
